<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACCP Officina 17</title>
</head>
<body>

<h1>HACCP Officina 17</h1>

<p>Controllo temperature</p>

<input type="text" id="frigo" placeholder="Frigorifero"><br><br>
<input type="number" id="temp" placeholder="Temperatura"><br><br>

<button onclick="salva()">Salva</button>

<p id="output"></p>

<script>
function salva(){
let f=document.getElementById("frigo").value;
let t=document.getElementById("temp").value;
document.getElementById("output").innerHTML += "<br>" + f + " - " + t + "°C";
}
</script>

</body>
</html>
