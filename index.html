<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACCP SISTEMA</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#eef2f5; }
.container { max-width:900px; margin:auto; padding:20px; background:white; }
h1 { text-align:center; }
nav button { margin:5px; padding:10px; }
section { display:none; }
.active { display:block; }
input, select { width:100%; padding:8px; margin:5px 0; }
.warn { color:red; font-weight:bold; }
.ok { color:green; }
.alert { background:#fff3cd; padding:10px; border:1px solid #ffeeba; }
</style>

</head>

<body>

<div class="container">

<h1>SISTEMA HACCP</h1>

<div id="login">
<input type="password" id="pin" placeholder="PIN">
<button id="loginBtn">Accedi</button>
</div>

<div id="app" style="display:none;">

<nav>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('temp')">Temperature</button>
<button onclick="show('pulizie')">Pulizie</button>
<button onclick="show('ricevimento')">Ricevimento</button>
<button onclick="show('audit')">Audit</button>
</nav>

<!-- DASHBOARD -->
<section id="dashboard" class="active">
<h2>Stato sistema</h2>
<div id="stato"></div>
<div id="alert"></div>
</section>

<!-- TEMPERATURE -->
<section id="temp">
<h2>Temperature</h2>

<select id="tipo">
<option>Frigo</option>
<option>Congelatore</option>
</select>

<input type="number" id="valore" placeholder="Temperatura">
<button onclick="addTemp()">Salva</button>

<div id="listaTemp"></div>
</section>

<!-- PULIZIE -->
<section id="pulizie">
<h2>Pulizie</h2>

<select id="ambiente">
<option>Cucina</option>
<option>Sala</option>
<option>Zona Lavaggio</option>
<option>Magazzino</option>
</select>

<input id="attrezzatura" placeholder="Attrezzatura">
<input id="pulizia" placeholder="Operazione">

<button onclick="addPulizia()">Salva</button>

<div id="listaPulizia"></div>
</section>

<!-- RICEVIMENTO -->
<section id="ricevimento">
<h2>Ricevimento Merci</h2>

<input id="fornitore" placeholder="Fornitore">
<input id="prodotto" placeholder="Prodotto">
<input id="lotto" placeholder="Lotto">

<button onclick="addRicevimento()">Salva</button>

<div id="listaRicevimento"></div>
</section>

<!-- AUDIT -->
<section id="audit">
<h2>Audit</h2>

<input type="date" id="dataAudit">
<input id="firma" placeholder="Firma operatore">

<button onclick="addAudit()">Registra</button>

<div id="listaAudit"></div>
</section>

<button onclick="generaPDF()">PDF Dashboard</button>
<button onclick="pdfTemp()">PDF Temperature</button>
<button onclick="pdfPulizie()">PDF Pulizie</button>
<button onclick="pdfRicevimento()">PDF Ricevimento</button>
<button onclick="pdfAudit()">PDF Audit</button>

</div>

</div>

<script>

const PIN = "5777";

let dati = JSON.parse(localStorage.getItem("dati")) || [];
let audit = JSON.parse(localStorage.getItem("audit")) || [];

/* LOGIN */
document.getElementById("loginBtn").addEventListener("click", function(){
 let pin = document.getElementById("pin").value;
 if(pin === PIN){
   document.getElementById("login").style.display = "none";
   document.getElementById("app").style.display = "block";
   aggiorna();
 } else alert("PIN errato");
});

function show(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function save(){
 localStorage.setItem("dati", JSON.stringify(dati));
 localStorage.setItem("audit", JSON.stringify(audit));
}

/* TEMPERATURE HACCP */
function addTemp(){

 let tipo = document.getElementById("tipo").value;
 let val = parseFloat(valore.value);

 let stato = "OK";

 if(tipo==="Frigo" && (val < 0 || val > 4)) stato = "NON CONFORME";
 if(tipo==="Congelatore" && val > -18) stato = "NON CONFORME";

 dati.push({tipo:"temp", categoria:tipo, valore:val, stato});

 save();
 aggiorna();
}

/* PULIZIE */
function addPulizia(){
 dati.push({
   tipo:"pulizia",
   ambiente: ambiente.value,
   attrezzatura: attrezzatura.value,
   operazione: pulizia.value
 });
 save();
 aggiorna();
}

/* RICEVIMENTO + LOTTI */
function addRicevimento(){
 dati.push({
   tipo:"ricevimento",
   fornitore:fornitore.value,
   prodotto:prodotto.value,
   lotto:lotto.value
 });
 save();
 aggiorna();
}

/* AUDIT */
function addAudit(){
 if(!dataAudit.value) return alert("Data obbligatoria");
 dati.push({
   tipo:"audit",
   data:dataAudit.value,
   firma:firma.value
 });
 save();
 aggiorna();
}

/* AGGIORNAMENTO */
function aggiorna(){

 let tempList="", pulList="", riceList="", auditList="";
 let errori = 0;

 dati.forEach(d=>{
   if(d.tipo==="temp"){
     if(d.stato==="NON CONFORME") errori++;
     tempList += `<div>${d.categoria} - ${d.valore}°C - ${d.stato}</div>`;
   }

   if(d.tipo==="pulizia")
     pulList += `<div><b>${d.ambiente}</b> - ${d.attrezzatura} - ${d.operazione}</div>`;

   if(d.tipo==="ricevimento")
     riceList += `<div>${d.fornitore} - ${d.prodotto} (Lotto: ${d.lotto})</div>`;

   if(d.tipo==="audit")
     auditList += `<div>${d.data} - ${d.firma}</div>`;
 });

 document.getElementById("listaTemp").innerHTML = tempList;
 document.getElementById("listaPulizia").innerHTML = pulList;
 document.getElementById("listaRicevimento").innerHTML = riceList;
 document.getElementById("listaAudit").innerHTML = auditList;

 document.getElementById("stato").innerHTML =
 errori ? "<span class='warn'>NON CONFORME</span>" : "<span class='ok'>CONFORME</span>";
}

/* PDF */
function generaPDF(){
 const { jsPDF } = window.jspdf;
 let pdf = new jsPDF();
 pdf.text("HACCP DASHBOARD",10,10);
 dati.forEach((d,i)=>{
   pdf.text(JSON.stringify(d),10,20+i*10);
 });
 pdf.save("dashboard.pdf");
}

function pdfTemp(){
 const { jsPDF } = window.jspdf;
 let pdf = new jsPDF();
 pdf.text("TEMPERATURE",10,10);
 dati.filter(d=>d.tipo==="temp").forEach((d,i)=>{
   pdf.text(`${d.categoria} ${d.valore}°C ${d.stato}`,10,20+i*10);
 });
 pdf.save("temperature.pdf");
}

function pdfPulizie(){
 const { jsPDF } = window.jspdf;
 let pdf = new jsPDF();
 pdf.text("PULIZIE",10,10);
 dati.filter(d=>d.tipo==="pulizia").forEach((d,i)=>{
   pdf.text(`${d.ambiente} ${d.attrezzatura} ${d.operazione}`,10,20+i*10);
 });
 pdf.save("pulizie.pdf");
}

function pdfRicevimento(){
 const { jsPDF } = window.jspdf;
 let pdf = new jsPDF();
 pdf.text("RICEVIMENTO",10,10);
 dati.filter(d=>d.tipo==="ricevimento").forEach((d,i)=>{
   pdf.text(`${d.fornitore} ${d.prodotto} lotto:${d.lotto}`,10,20+i*10);
 });
 pdf.save("ricevimento.pdf");
}

function pdfAudit(){
 const { jsPDF } = window.jspdf;
 let pdf = new jsPDF();
 pdf.text("AUDIT",10,10);
 dati.filter(d=>d.tipo==="audit").forEach((d,i)=>{
   pdf.text(`${d.data} ${d.firma}`,10,20+i*10);
 });
 pdf.save("audit.pdf");
}

</script>

</body>
</html>
