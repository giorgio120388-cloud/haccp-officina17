<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACCP Officina 17</title>
<style>
body { font-family: Arial; margin:20px; }
h1 { color:#333; }
input, button { padding:10px; margin:5px 0; width:100%; }
.section { border:1px solid #ccc; padding:15px; margin-bottom:15px; }
</style>
</head>

<body>

<h1>HACCP - Officina 17 S.N.C</h1>
<p>Via Fuori Porta Annunziata 50/52, Biccari (FG)</p>

<div class="section">
<h3>Frigoriferi</h3>
<select id="frigo">
<option>Frigo Bar</option>
<option>Frigo 1</option>
<option>Frigo 2</option>
<option>Vetrina Frollatura</option>
<option>Congelatore</option>
</select>

<input type="number" id="temp" placeholder="Temperatura (°C)">
<button onclick="salva()">Salva temperatura</button>
</div>

<div class="section">
<h3>Registro</h3>
<ul id="lista"></ul>
</div>

<div class="section">
<h3>Esporta PDF</h3>
<button onclick="exportPDF()">Scarica PDF</button>
</div>

<script>
function salva(){
let frigo=document.getElementById("frigo").value;
let temp=document.getElementById("temp").value;

let dati = JSON.parse(localStorage.getItem("haccp") || "[]");
dati.push({frigo,temp,data:new Date().toLocaleString()});
localStorage.setItem("haccp", JSON.stringify(dati));

carica();
}

function carica(){
let lista=document.getElementById("lista");
lista.innerHTML="";
let dati = JSON.parse(localStorage.getItem("haccp") || "[]");

dati.forEach(d=>{
let li=document.createElement("li");
li.innerText = d.data + " - " + d.frigo + " - " + d.temp + "°C";
lista.appendChild(li);
});
}

function exportPDF(){
window.print();
}

carica();
</script>

</body>
</html>
